<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Graphics Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Player Bank Sidebar -->
        <aside id="player-bank">
            <h2 class="sidebar-title">Player Bank</h2>
            <ul id="player-list"></ul>
            <button id="add-player-btn" class="btn-primary">+</button>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content">
            <div id="toolbar">
                 <div id="mode-selector">
                    <label><input type="radio" name="mode" value="bracket" checked> Playoffs</label>
                    <label><input type="radio" name="mode" value="groups"> Groups</label>
                </div>
                <label id="theme-selector">
                    <span>Version</span>
                    <select id="theme-select">
                        <option value="autumn">Autumn</option>
                        <option value="spring">Spring</option>
                    </select>
                </label>
                <button id="save-btn" class="btn-primary">Save</button>
                <button id="export-png" class="btn-primary">Export as PNG</button>
                <button id="export-pdf" class="btn-primary">Export as PDF</button>
                <button id="randomise-background-btn" class="btn-primary">Randomise Background</button>
                <button id="randomise-leaves-btn" class="btn-primary">Randomise Leaves</button>
                <button id="reset-btn" class="btn-primary">Reset</button>
            </div>

            <div id="canvas-wrapper">
                <div id="canvas">
                    <div class="background"></div>
                    <div id="decorations-container"></div>
                    <div class="overlay"></div>
                    <div class="edge-vignette"></div>
                    <div id="bottom-branding" data-draggable-id="branding-block">
                        <span class="hosted-by-text">Hosted by </span>
                        <img src="Media/text new-min.png" alt="Branding Logo" draggable="false">
                    </div>
                    <h1 id="main-title" contenteditable="true" data-draggable-id="main-title"></h1>
                    <div class="content-area"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="player-assign-modal" class="modal-hidden"></div>
    <div id="player-edit-modal" class="modal-hidden">
        <div class="modal-content">
            <h3>Edit Player</h3>
            <input type="text" id="edit-player-name" placeholder="Player Name">
            <div id="edit-flag-selection">
                <p>Current Flag: <img id="edit-current-flag" src="" alt="flag"></p>
                <input type="text" id="edit-flag-search" placeholder="Type to search flags...">
                <div id="edit-flag-options"></div>
            </div>
            <p>Avatar: <img id="edit-current-avatar" src="" class="avatar-preview"></p>
            <label for="edit-avatar-upload">Upload new avatar:</label>
            <input type="file" id="edit-avatar-upload" accept="image/*">
            <div class="modal-actions">
                <button id="save-player-changes-btn">Save Changes</button>
                <button id="cancel-player-edit-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="vendor/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
